<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuestra Historia ❤️ Belén</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;700&family=Sacramento&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Paleta de colores suaves y sofisticados */
            --primary-bg: #fff8f8; /* Soft Blush/Pearl */
            --secondary-bg: #ffe0e0; /* Champagne/Rosé */
            --card-bg: rgba(255, 255, 255, 0.4); /* Glassmorphism card */
            --text-color: #3d1f1f; /* Darker, softer Brown/Purple */
            --accent-color: #ff8fa2; /* Soft Pink accents */
            --font-body: 'Crimson Text', serif;
            --font-script: 'Sacramento', cursive;
        }

        body {
            /* --- ESTAS DOS LÍNEAS QUITAN EL DESTELLO AZUL Y LA SELECCIÓN DE TEXTO --- */
            -webkit-tap-highlight-color: transparent;
            user-select: none; 
            /* ------------------------------------------------------------------------ */
            
            margin: 0;
            font-family: var(--font-body);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            position: relative;
            cursor: pointer; /* Indica que se puede interactuar */
            background: linear-gradient(135deg, var(--primary-bg), var(--secondary-bg));
        }

        /* Partículas Mágicas detrás de la tarjeta */
        #particulas {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none; /* No bloquea clics */
        }

        .particula {
            position: absolute;
            background: rgba(255, 143, 162, 0.3); /* Soft pink sparkles */
            border-radius: 50%;
            animation: flotarParticula 15s linear infinite;
        }

        /* Tarjeta de Cristal refinada */
        #tarjeta {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 60px 40px;
            max-width: 650px;
            width: 90%;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.6);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 250px;
            perspective: 1500px; /* Para efecto 3D en las hojas */
            transition: transform 0.3s ease;
        }

        /* Animación suave al pasar el ratón por encima (feedback) */
        #tarjeta:hover {
            transform: translateY(-5px);
        }

        /* Contenedor del texto con animación de hoja */
        #contenedor {
            font-size: 1.6em;
            line-height: 1.8;
            transition: opacity 0.5s ease, transform 0.5s ease;
            transform-origin: left; /* Gira como un libro */
        }

        /* Estados de la animación de "hoja" */
        .hoja-actual { 
            opacity: 1; 
            transform: rotateY(0deg) scale(1); 
        }
        .hoja-sale { 
            opacity: 0; 
            transform: rotateY(-90deg) scale(0.9); 
        }
        .hoja-entra { 
            opacity: 0; 
            transform: rotateY(90deg) scale(1.1); 
        }

        /* Animación de entrada para el nuevo texto (cada frase se forma) */
        @keyframes formarFrase {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .texto-llegando {
            animation: formarFrase 0.8s ease forwards;
        }

        #indicacion {
            margin-top: 40px;
            font-size: 0.9em;
            opacity: 0.8;
            color: var(--accent-color);
            font-family: var(--font-body);
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: latido 3s infinite;
        }

        #contador {
            position: absolute;
            bottom: 30px;
            font-size: 1.2em;
            font-weight: bold;
            z-index: 10;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            font-family: var(--font-body);
        }

        .corazon {
            position: absolute;
            color: #ff4757;
            animation: flotar 8s linear infinite;
            opacity: 0.8;
            z-index: 2;
        }

        /* Mensaje final especial con fuente manuscrita */
        #contenedor.final-message span {
            font-family: var(--font-script);
            font-size: 2.2em;
            color: #d63031;
        }

        @keyframes flotarParticula {
            from { transform: translateY(0) scale(1); opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
        }

        @keyframes flotar {
            0% { transform: translateY(100vh) scale(1) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5) rotate(360deg); opacity: 0; }
        }

        @keyframes latido {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.03); }
        }
    </style>
</head>
<body onclick="siguiente()">

    <audio id="musicaFondo" loop>
        <source src="cancion.mp3" type="audio/mpeg">
    </audio>

    <div id="particulas"></div>

    <div id="tarjeta">
        <div id="contenedor" class="hoja-actual texto-llegando"></div>
        <div id="indicacion">Toca para continuar 👆</div>
    </div>
    
    <div id="contador"></div>

    <script>
        const textos = [
            "Todo empezó el 3 de septiembre de 2025, cuando te pedí el apunte de la clase de redacción.",
            "En ese momento no sabía que ese pequeño momento iba a cambiar tantas cosas.",
            "Mientras me explicabas, no podía evitar fijarme en ti… en tu carita, en tus manos, y en tu voz.",
            "Tal vez solo fue una excusa para hablar contigo, pero me alegra mucho que lo haya hecho.",
            "Después de ese día me gustaba saber que existías en mi mundo.",
            "Y que cuando te sonreía, tú también me sonreías.",
            "Fuiste tú quien empezó a acercarse más.",
            "Cuando dijiste que no había preguntado tu nombre y que querías saber el mío, me dio mucha alegría.",
            "Por primera vez hablamos de cosas que no eran solo de la escuela.",
            "Y ese día me quedé pensando mucho en lo que había pasado.",
            "Después coincidimos otra vez… y recuerdo muy bien tu vestido rosa con flores.",
            "Cada vez hablábamos más.",
            "En la biblioteca me preguntaste mi número, te di mi teléfono y te agregaste a mis contactos *Belén*.",
            "Desde ahí empezamos a compartir más tiempo juntos.",
            "Hubo un día en el que te recargaste en mí.",
            "Tal vez fue algo normal para ti o así lo sentí, pero para mí fue un momento que disfruté mucho.",
            "Después dejamos de vernos por un buen rato.",
            "Pero empezamos a hablar por mensajes, por las noches jugábamos y platicábamos.",
            "Aunque solo éramos amigos, ya sentía que eras especial.",
            "Después volvimos a vernos y por los nervios solo pude decirte que tus tenis estaban bonitos, cosa que también es verdad.",
            "Fuimos por un café… aunque lo importante realmente fue caminar contigo.",
            "Y sentir por primera vez que me tomabas del brazo.",
            "Cada vez que te veía pensaba que estabas más bonita que el día anterior.",
            "Se acercaba navidad y recuerdo con cariño el abrazo con el que nos despedimos ese día que fuimos por primera vez a Perisur.",
            "Después salimos otra vez…",
            "Y ese día nos tomamos de la mano por primera vez ❤️.",
            "Cuando me abrazaste no quería que ese momento terminara.",
            "Pasó navidad, pasó año nuevo…",
            "Y luego llegó el picnic.",
            "Conocer a tu perrita y verte hablarle me dio mucha ternura.",
            "Caminar contigo por Chapultepec fue un momento que nunca voy a olvidar.",
            "Y cuando vi que habías preparado fresas y pay de queso… ese detalle se quedó guardado en mi memoria.",
            "Después regresamos a la escuela.",
            "Y sentí que todo era una montaña de emociones.",
            "Hubo un día en que por fin me quité la pena y te abracé.",
            "Te cargué, te hice cosquillas…",
            "Y tú dijiste que ojalá existiera un control para detener el tiempo.",
            "Después llegó el 14 de febrero.",
            "Yo estaba nervioso y pensaba muchas cosas.",
            "Cuando me pediste leer tu carta no sabía qué esperar.",
            "Pero cuando entendí que lo decías en serio… me sentí muy feliz.",
            "Porque descubrí que lo que sentía por ti también existía en tu corazón.",
            "Disfruté mucho ese camino abrazándote.",
            "Y sentir tu manita con la mía.",
            "Antes de llegar a tu casa quería besarte…",
            "Y aunque fue un momento un poco torpe… fue nuestro primer beso.",
            "Y ese momento confirmó algo muy importante para mí.",
            "Que eres alguien muy especial en mi vida.",
            "Después llegó el lunes.",
            "El lunes en que me llevaste una gelatina.",
            "El lunes en que te pedí que fueras mi novia.",
            "Y hoy…",
            "Hoy se cumple un mes desde ese día.",
            "Un mes lleno de momentos, risas, mensajes y recuerdos.",
            "Gracias por existir.",
            "Gracias por aceptarme en tu vida.",
            "Y gracias por cada momento que hemos compartido.",
            "Te quiero mucho, Belén ❤️"
        ];

        let i = 0;
        let animando = false;
        let musicaIniciada = false;
        
        const contenedor = document.getElementById("contenedor");
        const indicacion = document.getElementById("indicacion");
        const musica = document.getElementById("musicaFondo");
        const contenedorParticulas = document.getElementById("particulas");
        
        // Inicializar el primer texto con animación
        contenedor.innerText = textos[i];
        contenedor.classList.add("texto-llegando");

        function siguiente() {
            // Reproducir música en el primer toque
            if (!musicaIniciada) {
                musica.play().catch(e => console.log("Música lista..."));
                musicaIniciada = true;
            }

            // Si está en medio de una animación o ya terminó, no hace nada
            if (animando || i >= textos.length - 1) return;
            animando = true;
            
            // 1. El texto actual sale como una "hoja" de libro
            contenedor.classList.remove("hoja-actual", "texto-llegando");
            contenedor.classList.add("hoja-sale");

            // 2. Esperamos a que termine de salir (500ms, más lento)
            setTimeout(() => {
                i++;
                let fraseActual = textos[i];
                
                // Preparamos para el mensaje final
                if (i === textos.length - 1) {
                    contenedor.innerHTML = '<span>Te quiero mucho ❤️ Belén</span>';
                    contenedor.classList.add('final-message');
                } else {
                    contenedor.innerText = fraseActual;
                }
                
                // Preparamos el texto para que entre desde la derecha
                contenedor.classList.remove("hoja-sale");
                contenedor.classList.add("hoja-entra");

                // Un pequeñísimo retraso para que el navegador registre la nueva posición
                setTimeout(() => {
                    contenedor.classList.remove("hoja-entra");
                    contenedor.classList.add("hoja-actual", "texto-llegando");
                    
                    // Si llegamos al final, cambiamos el texto de abajo
                    if(i === textos.length - 1){
                        indicacion.innerHTML = "<span>Nuestra historia apenas comienza ✨</span>";
                        indicacion.style.animation = "none";
                        indicacion.style.opacity = "1";
                    }

                    // Liberamos el candado
                    setTimeout(() => { animando = false; }, 500);
                }, 20);
            }, 500); 
        }

        // --- CONTADOR ---
        const inicio = new Date("September 3, 2025 16:45:00").getTime();
        function actualizarContador() {
            const ahora = new Date().getTime();
            const dif = ahora - inicio;
            const dias = Math.floor(dif / (1000 * 60 * 60 * 24));
            const horas = Math.floor((dif / (1000 * 60 * 60)) % 24);
            const minutos = Math.floor((dif / (1000 * 60)) % 60);
            const segundos = Math.floor((dif / 1000) % 60);
            document.getElementById("contador").innerHTML = "Han pasado<br><strong>" + dias + " días</strong> " + horas + " hrs " + minutos + " min " + segundos + " seg<br>desde que comenzó nuestra historia";
        }
        setInterval(actualizarContador, 1000);
        actualizarContador(); 

        // --- CORAZONES Y PARTÍCULAS FLOTANTES ---
        function crearCorazon() {
            const corazon = document.createElement("div");
            corazon.classList.add("corazon");
            corazon.innerText = "❤️";
            corazon.style.left = Math.random() * 100 + "vw";
            corazon.style.fontSize = (15 + Math.random() * 25) + "px";
            corazon.style.animationDuration = (6 + Math.random() * 4) + "s"; // Velocidad variable
            document.body.appendChild(corazon);
            setTimeout(() => { corazon.remove(); }, 8000);
        }

        function crearParticula() {
            const particula = document.createElement("div");
            particula.classList.add("particula");
            particula.style.width = particula.style.height = (2 + Math.random() * 4) + "px";
            particula.style.left = Math.random() * 100 + "vw";
            particula.style.top = Math.random() * 100 + "vh";
            particula.style.animationDuration = (10 + Math.random() * 10) + "s";
            contenedorParticulas.appendChild(particula);
            setTimeout(() => { particula.remove(); }, 20000);
        }

        // Creamos más corazones y partículas pero con tiempos variados
        setInterval(crearCorazon, 700);
        for(let j=0; j<10; j++) crearParticula(); // Llenamos de partículas iniciales
        setInterval(crearParticula, 2000); // Generamos nuevas poco a poco
    </script>
</body>
</html>
